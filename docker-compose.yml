services:
  tuic:
    image: native/tuic
    build: .
    container_name: tuic-server
    restart: always
    network_mode: host
    volumes:
      - ./config.json:/etc/tuic/config.json
      - ./certs:/etc/tuic/certs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: tuic-config-server
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./subscribe.yaml:/usr/share/nginx/html/subscribe.yaml
      - ./subscribe_reality.yaml:/usr/share/nginx/html/subscribe_reality.yaml
      - ./reality_link.txt:/usr/share/nginx/html/reality_link.txt
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray-reality
    restart: always
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./xray:/usr/local/etc/xray
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
