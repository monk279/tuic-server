port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: :9090

proxies:
  - name: "VPS-TUIC-v5"
    type: tuic
    server: YOUR_SERVER_IP
    port: 443
    uuid: YOUR_UUID_HERE
    password: YOUR_PASSWORD_HERE
    IP: YOUR_SERVER_IP
    skip-cert-verify: true
    alpn:
      - h3

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - VPS-TUIC-v5
      - DIRECT

rules:
  - MATCH,PROXY
